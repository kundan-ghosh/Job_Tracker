# ══════════════════════════════════════════════════════════════════
# Job Horizon — Sources Configuration
# Updated: 2026  |  45 sources across India
# ══════════════════════════════════════════════════════════════════

# ─── Candidate Profile ────────────────────────────────────────────
# The scraper uses these to score each scraped notice.
# Higher score = better match shown more prominently in the UI.
candidate:
  include_keywords:
    - machine learning
    - deep learning
    - computer vision
    - change detection
    - remote sensing
    - pytorch
    - python
    - data science
    - jrf
    - srf
    - research associate
    - project associate
    - internship
    - fellowship
    - neural network
    - image processing
    - satellite
    - geospatial
    - transformer
    - lora
  resume_keywords:
    - transformer
    - lora
    - neural network
    - image processing
    - satellite
    - geospatial
    - statistics
    - linear algebra
    - pytorch
    - tensorflow
    - scikit-learn
    - opencv
    - pandas
    - numpy
  location_keywords:
    - india
    - kolkata
    - west bengal
    - kharagpur
    - bangalore
    - bengaluru
    - remote
    - work from home
    - wfh
  exclude_keywords:
    - senior professor
    - 10 years experience
    - professor (grade pay 10000)
    - superintendent
    - registrar
  minimum_score: 1

