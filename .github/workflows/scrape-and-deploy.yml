name: Scrape jobs and deploy site


concurrency:
  group: scrape-and-deploy
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape live opportunities
        timeout-minutes: 25
        run: |
          python scraper/job_scraper.py \
            --max-sources 15 \
            --max-links-per-source 10 \
            --exclude-categories job-portal

      - name: Commit updated jobs data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/data/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs data [skip ci]"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
