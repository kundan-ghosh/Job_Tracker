# .github/workflows/scrape-and-deploy.yml

name: Scrape jobs and deploy site

on:
  schedule:
    - cron: '0 */6 * * *'      # Every 6 hours
  workflow_dispatch:             # Manual trigger button

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # ← INCREASE THIS from 8 to 30

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'           # ← Cache pip dependencies (saves ~30s per run)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape live opportunities
        timeout-minutes: 25      # ← Step-level timeout (slightly less than job timeout)
        run: |
          python scraper/job_scraper.py \
            --max-sources 15 \              # ← Reduce from 25 to 15 for GitHub Actions
            --max-links-per-source 10 \     # ← Reduce from 20 to 10
            --exclude-categories job-portal # ← Skip slow job portals (LinkedIn etc.)

      - name: Commit updated jobs data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs data [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
