name: Scrape jobs and deploy site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: pip install -r requirements.txt

      - name: Ensure editable config exists
        run: |
          test -f config/sources.yaml || cp config/sources.example.yaml config/sources.yaml
          test -f config/profile.yaml || cp config/profile.example.yaml config/profile.yaml

      - name: Scrape live opportunities
        timeout-minutes: 8
        continue-on-error: true
        run: python scraper/job_scraper.py --max-sources 10

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scrape
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
